<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>GP Approach Site</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --primary: #0a0a0a;
    --bg: #f5f5f5;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #737373;
    --border: #d4d4d4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    font-size: 15px;
    min-height: 100vh;
  }

  /* Lock screen */
  #lock-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #0a0a0a;
  }

  .lock-box {
    text-align: center;
    padding: 48px;
  }

  .lock-icon {
    width: 48px;
    height: 48px;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    color: rgba(255,255,255,0.4);
    font-size: 20px;
  }

  .lock-title {
    color: white;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 32px;
    opacity: 0.5;
  }

  .lock-input-wrap {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .lock-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    color: white;
    padding: 12px 20px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.1em;
    width: 240px;
    outline: none;
    transition: border-color 0.2s;
  }

  .lock-input:focus {
    border-color: rgba(255,255,255,0.3);
  }

  .lock-input::placeholder {
    color: rgba(255,255,255,0.2);
  }

  .lock-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.6);
    padding: 12px 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .lock-btn:hover {
    background: rgba(255,255,255,0.12);
    color: white;
  }

  .lock-error {
    color: #ef4444;
    font-size: 12px;
    margin-top: 16px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .lock-error.show { opacity: 1; }

  /* Main content */
  #main-content { display: none; }

  .hero {
    background: #0a0a0a;
    color: white;
    padding: 48px 40px;
    text-align: center;
    border-bottom: 1px solid #1a1a1a;
  }

  .hero h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .hero .subtitle {
    font-size: 12px;
    opacity: 0.4;
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  .container { max-width: 880px; margin: 0 auto; padding: 0 24px; }

  .section { padding: 48px 0; }

  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
  }

  /* Company group */
  .company-group {
    margin-bottom: 40px;
  }

  .company-name {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .company-meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .page-cards {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .page-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    color: var(--text);
    transition: all 0.15s;
  }

  .page-card:hover {
    border-color: #999;
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .page-card-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .page-type {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid;
    white-space: nowrap;
  }

  .page-type.demo {
    color: #0a0a0a;
    border-color: #0a0a0a;
  }

  .page-type.memo {
    color: #6366f1;
    border-color: #6366f1;
  }

  .page-type.list {
    color: #059669;
    border-color: #059669;
  }

  .page-title {
    font-size: 14px;
    font-weight: 500;
  }

  .page-arrow {
    color: var(--muted);
    font-size: 14px;
    opacity: 0.4;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 0;
  }

  /* Other pages section */
  .other-section {
    padding: 32px 0 48px;
  }

  .other-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .other-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 14px 16px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.15s;
    font-size: 13px;
  }

  .other-card:hover {
    border-color: #999;
  }

  .other-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  footer {
    text-align: center;
    padding: 32px;
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<!-- Lock Screen -->
<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-icon">&#x1f512;</div>
    <div class="lock-title">GP Approach Site</div>
    <div class="lock-input-wrap">
      <input type="password" id="pw-input" class="lock-input" placeholder="Password" autofocus>
      <button id="pw-btn" class="lock-btn">Enter</button>
    </div>
    <div id="pw-error" class="lock-error">パスワードが違います</div>
  </div>
</div>

<!-- Encrypted Content (AES-GCM) -->
<div id="main-content"></div>

<script>
// --- AES-GCM encryption/decryption ---
const SALT = new Uint8Array([103,112,97,112,112,114,111,97,99,104,115,105,116,101,50,48]);

async function deriveKey(password) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: SALT, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

async function decrypt(encryptedB64, password) {
  const data = Uint8Array.from(atob(encryptedB64), c => c.charCodeAt(0));
  const iv = data.slice(0, 12);
  const ciphertext = data.slice(12);
  const key = await deriveKey(password);
  const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
  return new TextDecoder().decode(decrypted);
}

const input = document.getElementById('pw-input');
const btn = document.getElementById('pw-btn');
const error = document.getElementById('pw-error');

async function tryUnlock() {
  const pw = input.value;
  if (!pw) return;
  try {
    const html = await decrypt(ENCRYPTED_PAYLOAD, pw);
    document.getElementById('lock-screen').style.display = 'none';
    const main = document.getElementById('main-content');
    main.innerHTML = html;
    main.style.display = 'block';
    sessionStorage.setItem('gp-pw', pw);
  } catch {
    error.classList.add('show');
    input.value = '';
    input.focus();
    setTimeout(() => error.classList.remove('show'), 2000);
  }
}

btn.addEventListener('click', tryUnlock);
input.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

// Auto-unlock from session
(async () => {
  const saved = sessionStorage.getItem('gp-pw');
  if (saved && ENCRYPTED_PAYLOAD !== '##ENCRYPTED_PAYLOAD##') {
    try {
      const html = await decrypt(ENCRYPTED_PAYLOAD, saved);
      document.getElementById('lock-screen').style.display = 'none';
      const main = document.getElementById('main-content');
      main.innerHTML = html;
      main.style.display = 'block';
    } catch {}
  }
})();
</script>
